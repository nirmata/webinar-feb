apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment-fail
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app-fail
  template:
    metadata:
      labels:
        app: test-app-fail
        environment: test
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"