apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  annotations:
    policies.kyverno.io/category: Other
    policies.kyverno.io/description: This policy validates that all pods must have the label 'foo' with value 'bar' present.
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Label
    policies.kyverno.io/title: Require foo=bar Label
  name: require-foo-bar-label
spec:
  background: true
  rules:
  - match:
      any:
      - resources:
          kinds:
          - Pod
          operations:
          - CREATE
          - UPDATE
    name: check-foo-bar-label
    validate:
      cel:
        expressions:
        - expression: has(object.metadata.labels) && has(object.metadata.labels.foo) && object.metadata.labels.foo == 'bar'
          messageExpression: '''Pod must have label foo=bar, but found: '' + (has(object.metadata.labels) && has(object.metadata.labels.foo) ? ''foo='' + object.metadata.labels.foo : ''no foo label'')'
  validationFailureAction: Audit
